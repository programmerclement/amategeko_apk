name: amategeko
description: "Traffic rules learning and exam app"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  http: ^1.6.0
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# 👇 ONLY ONE flutter SECTION
flutter:
  uses-material-design: true

  assets:
    - assets/logo.png

# 👇 ICON CONFIG
flutter_icons:
  android: true
  ios: false
  image_path: "assets/logo.png"

# 👇 SPLASH CONFIG
flutter_native_splash:
  color: "#ffffff"
  image: assets/logo.png
  android: true